<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/normalize.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="images/logo.jpg" />
    <title>مواقيت الصلاة</title>
  </head>
  <body class="bg-[#0f172a] font-['Cairo','sans-serif']">
    <div class="container mx-auto px-4 sm:px-6 md:px-10 lg:px-16 xl:px-24">
      <header class="flex justify-between items-center pt-2 pb-2">
        <h1 class="text-white text-2xl">
          مواقيت <span class="text-[var(--main-color)]">الصلاة</span>
        </h1>
        <img src="images/logo.png" class="size-8" />
      </header>
    </div>
    <div class="line w-full h-px bg-gray-500"></div>
    <div class="container mx-auto px-4 sm:px-6 md:px-10 lg:px-16 xl:px-24">
      <section class="times-now flex flex-col gap-3 md:flex-row pt-8">
        <div class="location flex-1">
          <div class="city text-[var(--main-color)]">
            <i class="fa-solid fa-location-dot"></i>
            <span>القاهرة </span>,
            <span>مصر</span>
          </div>
          <div
            class="text-6xl text-white mt-2 font-light font-extralight [&_span]:text-[var(--main-color)]"
            id="time-now"
          ></div>
          <div class="date-today flex gap-1 items-center text-white my-5">
            <div class="text-[var(--main-color)]" id="hijri-date"></div>
            <i class="fa-solid fa-circle text-[5px]"></i>
            <div id="gregorian-date"></div>
          </div>
          <div
            class="flex flex-col md:flex-row items-center gap-4 mt-12 md:mt-3"
          >
            <div class="relative w-64">
              <button
                id="dropdown-btn"
                class="w-full bg-gray-100 border border-gray-300 rounded p-2 text-gray-700 text-left flex justify-between items-center focus:outline-none focus:border-blue-500"
              >
                اختر الموقع
                <svg
                  class="fill-current h-8 w-8 transform transition-transform duration-200"
                  id="dropdown-arrow"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                >
                  <path d="M7 7l3 3 3-3H7z" />
                </svg>
              </button>
              <ul
                id="dropdown-menu"
                class="absolute hidden w-full bg-white border border-gray-300 mt-1 rounded shadow z-10 overflow-auto max-h-60"
              ></ul>
            </div>
            <div class="bg-[#efefef0c] p-2 rounded-3xl text-white pl-4 pr-4">
              طريقة الحساب : MWL
            </div>
          </div>
        </div>
        <div
          class="next-prayer border border-gray-700 md:w-[40%] bg-[#efefef0c] p-5 w-full rounded-2xl flex flex-col justify-between"
        >
          <div>
            <p class="text-[var(--main-color)]">الصلاة القادمة :</p>
            <p
              class="text-white text-3xl lg:text-4xl font-semibold pr-2"
              id="next"
            ></p>
          </div>
          <div>
            <div
              class="time-remains text-2xl lg:text-3xl text-white font-semibold pt-3 text-left"
            >
              متبقي <span class="text-[var(--main-color)]">03 : 34: 53</span>
            </div>
          </div>
        </div>
      </section>
      <section
        class="mt-12 [&_i]:text-[var(--main-color)] [&_i]:text-3xl [&_h4]:text-gray-500 [&_h4]:my-1.5 [&_p]:text-white [&_p]:text-3xl [&_div]:p-6 [&_div]:rounded-2xl [&_div]:border [&_div]:border-gray-600 [&_div]:bg-[#efefef0c] grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 text-center gap-2"
      >
        <div class="prayer-time">
          <i class="fa-regular fa-alarm-clock"></i>
          <h4 class="name">الفجر</h4>
          <p id="fajr"></p>
        </div>
        <div class="prayer-time">
          <i class="fa-solid fa-sun"></i>
          <h4 class="name">الشروق</h4>
          <p id="sunrise"></p>
        </div>
        <div class="prayer-time">
          <i class="fa-solid fa-temperature-high"></i>
          <h4 class="name">الظهر</h4>
          <p id="dhuhr"></p>
        </div>
        <div class="prayer-time">
          <i class="fa-solid fa-cloud-sun"></i>
          <h4 class="name">العصر</h4>
          <p id="asr"></p>
        </div>
        <div class="prayer-time">
          <i class="fa-solid fa-cloud-moon"></i>
          <h4 class="name">المغرب</h4>
          <p id="maghrib"></p>
        </div>
        <div class="prayer-time">
          <i class="fa-regular fa-moon"></i>
          <h4 class="name">العشاء</h4>
          <p id="isha"></p>
        </div>
      </section>
    </div>
    <script src="main.js"></script>
  </body>
</html>
